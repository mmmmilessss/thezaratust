title: 겨울방학
date: 2025.08.25
description: |
  오늘도 같은 회색 후드에 검은 면바지
  3층 하늘 복도 위를 걷는다
  추위는 면 사이의 구멍을 뚫고
  회색 모자는 내 목을 조여운다

  고불한 검은 빗자루는 눈을 찌르고
  겨울의 바람은 낙엽을 뒤섞는다
  저 하얀 태양엔 휘황찬란 용이 날고
  무지개의 가시는 나의 열일곱을 찌른다

  투명한 검정 흰색 숫자 세 개 물방울
  빛이 만든 카페트 내려가면
  수많은 나무의 소실점이 나를 반긴다
  금수의 젖과 꿀은 언제나 감미롭구나

  고불한 검은 빗자루는 눈을 찌르고
